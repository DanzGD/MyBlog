<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Malam - Cerita Biasa Saja...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Creepster&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: #0a0000;
      color: #ddd;
      font-family: 'Creepster', cursive;
      overflow-x: hidden;
      cursor: url('https://i.imgur.com/8Y5Zf3K.png'), auto; /* cursor creepy (bisa ganti) */
    }

    /* Background static + pulse merah */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(139,0,0,0.07), rgba(0,0,0,0.9));
      animation: static 0.08s steps(5) infinite, pulse 4s infinite alternate;
      pointer-events: none;
      z-index: -1;
    }

    @keyframes static {
      0% { background-position: 0 0; }
      100% { background-position: 100% 100%; }
    }
    @keyframes pulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    /* Glitch text */
    .glitch {
      position: relative;
      color: #fff;
      font-size: 3.5rem;
      text-shadow: 0 0 10px #f00;
      animation: glitch 2s infinite;
    }
    .glitch::before, .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0.8;
    }
    .glitch::before {
      animation: glitch-anim 1.2s infinite linear alternate-reverse;
      color: #0ff;
      left: 2px;
      text-shadow: -2px 0 #f00;
    }
    .glitch::after {
      animation: glitch-anim2 0.8s infinite linear alternate-reverse;
      color: #f0f;
      left: -2px;
      text-shadow: 2px 0 #0f0;
    }

    @keyframes glitch-anim {
      0% { clip: rect(20px, 9999px, 60px, 0); }
      20% { clip: rect(80px, 9999px, 120px, 0); }
      40% { clip: rect(40px, 9999px, 90px, 0); }
      60% { clip: rect(70px, 9999px, 110px, 0); }
      80% { clip: rect(30px, 9999px, 70px, 0); }
      100% { clip: rect(50px, 9999px, 100px, 0); }
    }
    @keyframes glitch-anim2 {
      0% { clip: rect(10px, 9999px, 50px, 0); }
      20% { clip: rect(60px, 9999px, 100px, 0); }
      40% { clip: rect(30px, 9999px, 80px, 0); }
      60% { clip: rect(90px, 9999px, 140px, 0); }
      80% { clip: rect(20px, 9999px, 60px, 0); }
      100% { clip: rect(40px, 9999px, 90px, 0); }
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: rgba(20,0,0,0.85);
      border: 2px solid #500;
    }

    .story {
      margin: 40px 0;
      line-height: 1.8;
      font-size: 1.3rem;
    }

    /* Eyes following */
    #eyes {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 999;
      width: 120px;
      display: flex;
      gap: 20px;
    }
    .eye {
      width: 50px;
      height: 50px;
      background: #111;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      border: 4px solid #400;
    }
    .pupil {
      width: 20px;
      height: 20px;
      background: #f00;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: all 0.1s;
      box-shadow: 0 0 15px #f00;
    }

    .jumpscare {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .jumpscare img {
      max-height: 95vh;
      filter: brightness(1.3);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 class="glitch" data-text="Blog Malam">Blog Malam</h1>
    <p style="text-align:center; color:#700; font-size:1.1rem;">Cerita sehari-hari... atau bukan?</p>

    <div class="story" id="story1">
      <h2>Hari ini biasa saja...</h2>
      <p>Aku duduk di kamar sendirian. Lampu redup. Kamu lagi baca ini juga sendirian kan? Bagus.</p>
    </div>

    <div class="story" id="story2">
      <h2>Kenapa kamu masih di sini?</h2>
      <p>Seharusnya kamu sudah pergi. Tapi kamu tetap scroll ya? Aku tahu kamu di sana...</p>
    </div>
  </div>

  <!-- Mata ngikutin -->
  <div id="eyes">
    <div class="eye"><div class="pupil" id="pupil1"></div></div>
    <div class="eye"><div class="pupil" id="pupil2"></div></div>
  </div>

  <!-- Jumpscare layer -->
  <div class="jumpscare" id="jumpscare">
    <img src="scary.jpg" id="scareImg" alt="...">
  </div>

  <!-- Audio napas hantu (loop pelan) -->
  <audio id="breathing" loop autoplay>
    <source src="https://www.orangefreesounds.com/wp-content/uploads/2019/08/Horror-scary-breathing.mp3" type="audio/mpeg">
  </audio>

  <script>
    // Mata ngikutin mouse
    document.addEventListener('mousemove', (e) => {
      const pupils = document.querySelectorAll('.pupil');
      pupils.forEach(pupil => {
        const eye = pupil.parentElement.getBoundingClientRect();
        const eyeCenterX = eye.left + eye.width / 2;
        const eyeCenterY = eye.top + eye.height / 2;
        const angle = Math.atan2(e.clientY - eyeCenterY, e.clientX - eyeCenterX);
        const distance = Math.min(12, Math.hypot(e.clientX - eyeCenterX, e.clientY - eyeCenterY) / 10);
        pupil.style.transform = `translate(-50%, -50%) translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px)`;
      });
    });

    // Teks berubah jadi creepy setelah 8 detik
    setTimeout(() => {
      document.getElementById('story1').innerHTML = `
        <h2>Hari ini biasa saja...</h2>
        <p style="color:#900;">Aku duduk di kamar sendirian.<br>Kamu juga sendirian sekarang.<br>Aku bisa mendengar napasmu.</p>
      `;
      document.getElementById('story2').innerHTML = `
        <h2>Kenapa kamu masih di sini?</h2>
        <p style="color:#900;">Aku tahu kamu takut tutup tab.<br>Aku di belakang kamu sekarang.<br>Jangan menoleh.</p>
      `;
    }, 8000);

    // Jumpscare setelah 18 detik + kalau scroll ke bawah
    setTimeout(() => {
      triggerJumpscare();
    }, 18000);

    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) {
        triggerJumpscare();
      }
    });

    function triggerJumpscare() {
      const audio = document.getElementById('breathing');
      audio.volume = 0.4;

      const scare = document.getElementById('jumpscare');
      scare.style.display = 'flex';
      
      // Efek kedip + suara jerit tambahan (kalau mau tambah scream.mp3 sendiri)
      setTimeout(() => scare.style.background = '#300', 150);
      setTimeout(() => scare.style.background = 'black', 300);

      setTimeout(() => {
        scare.style.display = 'none';
      }, 2800);
    }

    // Volume napas pelan biar unsettling
    document.getElementById('breathing').volume = 0.25;
  </script>
</body>
</html>
